<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" width="400" height="420">
  <defs>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB020;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F97316;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3a3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#222222;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="boltGlow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle (dark) -->
  <circle cx="200" cy="195" r="185" fill="#111111"/>

  <!-- Outer hexagon -->
  <polygon
    points="200,30 340,112 340,278 200,360 60,278 60,112"
    fill="url(#hexGrad)"
    stroke="#F97316"
    stroke-width="5"
    stroke-linejoin="round"
  />

  <!-- Inner hexagon (slightly smaller, darker) -->
  <polygon
    points="200,52 322,122 322,262 200,332 78,262 78,122"
    fill="#1a1a1a"
    stroke="#555"
    stroke-width="1.5"
    stroke-linejoin="round"
  />

  <!-- Circuit lines on left side -->
  <g stroke="#F97316" stroke-width="2" fill="none" opacity="0.7">
    <!-- Left circuit dots and lines -->
    <circle cx="78" cy="160" r="4" fill="#F97316"/>
    <line x1="78" y1="160" x2="110" y2="160"/>
    <line x1="110" y1="160" x2="110" y2="178"/>
    <circle cx="110" cy="178" r="3" fill="#F97316" opacity="0.5"/>

    <circle cx="78" cy="200" r="4" fill="#F97316"/>
    <line x1="78" y1="200" x2="115" y2="200"/>
    <circle cx="115" cy="200" r="3" fill="#F97316" opacity="0.5"/>

    <circle cx="78" cy="240" r="4" fill="#F97316"/>
    <line x1="78" y1="240" x2="108" y2="240"/>
    <line x1="108" y1="240" x2="108" y2="222"/>
    <circle cx="108" cy="222" r="3" fill="#F97316" opacity="0.5"/>
  </g>

  <!-- Circuit lines on right side -->
  <g stroke="#F97316" stroke-width="2" fill="none" opacity="0.7">
    <circle cx="322" cy="160" r="4" fill="#F97316"/>
    <line x1="322" y1="160" x2="290" y2="160"/>
    <line x1="290" y1="160" x2="290" y2="178"/>
    <circle cx="290" cy="178" r="3" fill="#F97316" opacity="0.5"/>

    <circle cx="322" cy="200" r="4" fill="#F97316"/>
    <line x1="322" y1="200" x2="285" y2="200"/>
    <circle cx="285" cy="200" r="3" fill="#F97316" opacity="0.5"/>

    <circle cx="322" cy="240" r="4" fill="#F97316"/>
    <line x1="322" y1="240" x2="292" y2="240"/>
    <line x1="292" y1="240" x2="292" y2="222"/>
    <circle cx="292" cy="222" r="3" fill="#F97316" opacity="0.5"/>
  </g>

  <!-- Lightning bolt -->
  <g filter="url(#boltGlow)">
    <polygon
      points="218,75 155,205 198,205 178,325 255,185 208,185"
      fill="url(#boltGrad)"
      stroke="#FFB020"
      stroke-width="1.5"
      stroke-linejoin="round"
    />
    <!-- Inner highlight on bolt -->
    <polygon
      points="215,95 168,195 200,195 182,295 245,200 210,200"
      fill="#FFD060"
      opacity="0.25"
      stroke="none"
    />
  </g>

  <!-- TRONMATIX text -->
  <text
    x="200" y="378"
    font-family="Arial, Helvetica, sans-serif"
    font-size="32"
    font-weight="900"
    letter-spacing="6"
    fill="#cccccc"
    text-anchor="middle"
    dominant-baseline="middle"
  >TRONMATIX</text>

  <!-- COMPUTER text -->
  <text
    x="200" y="408"
    font-family="Arial, Helvetica, sans-serif"
    font-size="14"
    font-weight="600"
    letter-spacing="8"
    fill="#F97316"
    text-anchor="middle"
    dominant-baseline="middle"
  >COMPUTER</text>
</svg>
