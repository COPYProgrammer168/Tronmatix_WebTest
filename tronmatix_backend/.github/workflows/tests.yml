name: Tests (PHPUnit + Pest)

on:
  push:
    branches: [develop, main, master]
  pull_request:
    branches: [develop, main, master]

jobs:
  php-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.1', '8.2', '8.3']   # stable versions

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, ctype, json, tokenizer, pdo_mysql, pdo_sqlite
          coverage: xdebug
          tools: composer:v2

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-progress --no-suggest --no-interaction

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: tronmatix_frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: tronmatix_frontend
        run: npm ci

      - name: Copy .env
        run: cp .env.example .env || true

      - name: Generate app key
        run: php artisan key:generate --ansi

      - name: Run PHPUnit/Pest tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
        run: ./vendor/bin/phpunit --colors=always --testdox
