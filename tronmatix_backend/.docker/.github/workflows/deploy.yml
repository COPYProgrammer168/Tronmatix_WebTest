name: Build Frontend & Deploy to Render (Static Site)

on:
  push:
    branches: ["main"]
  workflow_dispatch: # allows manual trigger from GitHub Actions tab

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ──────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: tronmatix_frontend/package-lock.json

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        working-directory: tronmatix_frontend
        run: npm ci

      # ── 4. Build frontend ─────────────────────────────────────────────────────
      - name: Build frontend
        working-directory: tronmatix_frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # ── 5. List build output (debug) ──────────────────────────────────────────
      - name: List build output (debug)
        run: ls -la tronmatix_frontend/dist

      # ── 6. Trigger Render Deployment ──────────────────────────────────────────
      # HOW TO SET THE SECRET:
      #   1. Render Dashboard → your service → Settings → Deploy Hook → copy URL
      #   2. GitHub repo → Settings → Secrets and variables → Actions → New secret
      #      Name:  RENDER_DEPLOY_HOOK
      #      Value: https://api.render.com/deploy/srv-XXXX?key=YYYY
      #      (no quotes, no trailing spaces or newlines)
      - name: Trigger Render Deployment
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          # Validate secret is set before attempting curl
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "❌ ERROR: RENDER_DEPLOY_HOOK secret is not set in GitHub."
            echo "   Go to: GitHub repo → Settings → Secrets and variables → Actions"
            echo "   Add secret name: RENDER_DEPLOY_HOOK"
            echo "   Value: your Render deploy hook URL (from Render Dashboard → Settings → Deploy Hook)"
            exit 1
          fi

          echo "🚀 Triggering Render deployment..."

          HTTP_STATUS=$(curl -s -o /tmp/render_response.txt -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{}' \
            "$RENDER_DEPLOY_HOOK")

          RESPONSE_BODY=$(cat /tmp/render_response.txt)
          echo "Response: $RESPONSE_BODY"
          echo "HTTP status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "✅ Render deployment triggered successfully (HTTP $HTTP_STATUS)"
          else
            echo "❌ Render deployment trigger failed (HTTP $HTTP_STATUS)"
            exit 1
          fi
