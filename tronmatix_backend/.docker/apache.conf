<VirtualHost *:10000>
    ServerName tronmatix-beckend.onrender.com

    DocumentRoot /var/www/html/public

    # FIX: Removed all custom RewriteRules from VirtualHost level.
    # Laravel's own .htaccess in public/ handles all routing correctly.
    # Having RewriteRules in BOTH the VirtualHost AND .htaccess caused
    # "10 internal redirects" infinite loop → 500 error.
    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Security headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"

    # CORS headers for React frontend
    Header always set Access-Control-Allow-Origin "%{HTTP_ORIGIN}e" "expr=-n '%{HTTP_ORIGIN}'"
    Header always set Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    Header always set Access-Control-Allow-Headers "Content-Type, Authorization, Accept, X-Requested-With"

    # Handle OPTIONS preflight requests
    RewriteEngine On
    RewriteCond %{REQUEST_METHOD} OPTIONS
    RewriteRule ^(.*)$ $1 [R=200,L]

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
