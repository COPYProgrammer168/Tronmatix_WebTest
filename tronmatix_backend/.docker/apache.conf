<VirtualHost *:10000>
    ServerName localhost
    DocumentRoot /var/www/html/public

    # ── Laravel API (public/ directory) ───────────────────────────────────────
    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # ── React SPA (public/spa/) ────────────────────────────────────────────────
    # Serve React SPA static assets directly
    <Directory /var/www/html/public/spa>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # React SPA client-side routing — serve index.html for all non-asset SPA routes.
    # API requests (/api/*) pass through to Laravel via the .htaccess rewrite.
    # NOTE: This alias must come BEFORE the general rewrite rules.
    RewriteEngine On

    # Static SPA assets (js, css, images) — serve directly
    RewriteCond %{REQUEST_URI} ^/spa/assets/
    RewriteRule ^ - [L]

    # All non-API routes → React SPA index.html (client-side routing)
    RewriteCond %{REQUEST_URI} !^/api/
    RewriteCond %{REQUEST_URI} !^/storage/
    RewriteCond %{REQUEST_URI} !^/spa/
    RewriteCond %{DOCUMENT_ROOT}/public%{REQUEST_FILENAME} !-f
    RewriteCond %{DOCUMENT_ROOT}/public%{REQUEST_FILENAME} !-d
    RewriteRule ^ /spa/index.html [L]

    # Security headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
