<VirtualHost *:10000>
    ServerName tronmatix-beckend.onrender.com
    DocumentRoot /var/www/html/public

    # Trust Render's reverse proxy HTTPS header
    SetEnvIf X-Forwarded-Proto https HTTPS=on

    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # ── FIX: CORS headers on EVERY response (incl. 4xx/5xx) ──────────────────
    # FIX: Updated regex to include tronmatix-frontend (was tronmatix-webtest)
    # Pattern covers: tronmatix-frontend, tronmatix-webtest (legacy), localhost:*
    SetEnvIf Origin "^https://(tronmatix-frontend\.onrender\.com|localhost:[0-9]+|127\.0\.0\.1:[0-9]+)$" CORS_ORIGIN=$0
    Header always set Access-Control-Allow-Origin "%{CORS_ORIGIN}e" env=CORS_ORIGIN

    Header always unset Access-Control-Allow-Methods
    Header always set Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS"

    Header always unset Access-Control-Allow-Headers
    Header always set Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With, X-CSRF-TOKEN"

    Header always set Access-Control-Expose-Headers "Authorization"
    Header always set Access-Control-Max-Age "86400"
    Header always set Vary "Origin"

    # ── Return 200 for OPTIONS preflight immediately (skip Laravel/PHP) ───────
    RewriteEngine On
    RewriteCond %{REQUEST_METHOD} OPTIONS
    RewriteRule ^ - [R=200,L]

    # Security headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

    ErrorLog  /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
