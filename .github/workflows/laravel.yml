# .github/workflows/laravel.yml
# Single workflow — triggers Render to rebuild the frontend on every push to master.

name: Deploy Frontend to Render

on:
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Check _redirects exists — try both monorepo and root locations
      - name: Check public/_redirects exists
        run: |
          if [ -f "tronmatix_frontend/public/_redirects" ]; then
            echo "✅ Found at tronmatix_frontend/public/_redirects"
          elif [ -f "public/_redirects" ]; then
            echo "✅ Found at public/_redirects"
          else
            echo "❌ public/_redirects is missing! Creating it now..."
            mkdir -p public
            echo "/* /index.html 200" > public/_redirects
            echo "✅ Created public/_redirects"
          fi

      - name: Trigger Render deployment
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "❌ RENDER_DEPLOY_HOOK secret is not set"
            echo "   Render → Service → Settings → Deploy Hook → copy URL"
            echo "   GitHub → Settings → Secrets → Actions → New secret → RENDER_DEPLOY_HOOK"
            exit 1
          fi

          echo "🚀 Triggering Render deployment..."

          HTTP_STATUS=$(curl -s -o /tmp/render_response.txt -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{}' \
            "$RENDER_DEPLOY_HOOK")

          echo "Response: $(cat /tmp/render_response.txt)"
          echo "HTTP status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "✅ Render build triggered successfully (HTTP $HTTP_STATUS)"
            echo "   Monitor: https://dashboard.render.com"
          else
            echo "❌ Deploy trigger failed (HTTP $HTTP_STATUS)"
            exit 1
          fi
