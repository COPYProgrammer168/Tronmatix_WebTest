# .github/workflows/laravel.yml
name: Deploy Frontend to Render

on:
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify _redirects exists
        run: |
          if [ -f "public/_redirects" ]; then
            echo "✅ public/_redirects exists: $(cat public/_redirects)"
          else
            echo "❌ public/_redirects is MISSING from the repo!"
            echo "   Create the file manually: public/_redirects"
            echo "   Content: /* /index.html 200"
            echo "   Then commit and push it."
            exit 1
          fi

      - name: Trigger Render deployment
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "❌ RENDER_DEPLOY_HOOK secret is not set"
            exit 1
          fi
          HTTP_STATUS=$(curl -s -o /tmp/render_response.txt -w "%{http_code}" \
            -X POST -H "Content-Type: application/json" -d '{}' \
            "$RENDER_DEPLOY_HOOK")
          echo "HTTP status: $HTTP_STATUS — $(cat /tmp/render_response.txt)"
          [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ] && echo "✅ Render build triggered" || exit 1
