name: Build Frontend & Deploy to Render (Static Site)

on:
  push:
    branches: ["main"]
  workflow_dispatch:   # allows manual trigger from GitHub Actions tab

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the full repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js (match your local version)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: tronmatix_frontend/package-lock.json

      # 3. Install dependencies
      - name: Install dependencies
        working-directory: tronmatix_frontend
        run: npm ci

      # 4. Build frontend (with backend URL injected)
      - name: Build frontend
        working-directory: tronmatix_frontend
        run: npm run build
        env:
          # This URL is used in production build
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # 5. (Optional) Show what was built – good for debugging
      - name: List build output (debug)
        run: ls -la tronmatix_frontend/dist

      # 6. Trigger Render redeploy using Deploy Hook
      - name: Trigger Render Deployment
        run: |
          curl -X POST \
            "${{ secrets.RENDER_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json" \
            -d '{}'