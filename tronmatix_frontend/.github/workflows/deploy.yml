# .github/workflows/deploy.yml
# ── Place this in: tronmatix_frontend/.github/workflows/deploy.yml ────────────

name: Build & Deploy Frontend to Render Static Site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup Node ─────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # ── 3. Install ────────────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # ── 4. Build ──────────────────────────────────────────────────────────────
      # VITE_API_URL injected at build time into JS bundle.
      # GitHub Secret: VITE_API_URL = https://tronmatix-beckend.onrender.com
      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # ── 5. Verify ─────────────────────────────────────────────────────────────
      - name: List build output (debug)
        run: ls -la dist/

      # ── 6. Deploy ─────────────────────────────────────────────────────────────
      # GitHub Secret: RENDER_DEPLOY_HOOK = https://api.render.com/deploy/srv-xxx?key=yyy
      - name: Trigger Render deployment
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "❌ RENDER_DEPLOY_HOOK secret is not set"
            echo "   Render → Tronmatix_frontend → Settings → Deploy Hook → copy URL"
            echo "   GitHub → Settings → Secrets → Actions → New secret → RENDER_DEPLOY_HOOK"
            exit 1
          fi

          echo "🚀 Triggering Render deployment..."

          HTTP_STATUS=$(curl -s -o /tmp/render_response.txt -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{}' \
            "$RENDER_DEPLOY_HOOK")

          echo "Response: $(cat /tmp/render_response.txt)"
          echo "HTTP status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "✅ Deployed successfully (HTTP $HTTP_STATUS)"
          else
            echo "❌ Deploy failed (HTTP $HTTP_STATUS)"
            exit 1
          fi