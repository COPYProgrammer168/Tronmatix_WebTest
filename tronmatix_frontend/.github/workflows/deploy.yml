# .github/workflows/deploy.yml
# ── Place this in: tronmatix_frontend/.github/workflows/deploy.yml ────────────
#
# HOW THIS WORKS:
#   Render is a Static Site — it clones your repo and runs its OWN build.
#   This workflow simply triggers that Render build via deploy hook.
#   VITE_API_URL must be set in Render → Environment (not only here).
#
# REQUIRED SECRETS (GitHub → Settings → Secrets → Actions):
#   RENDER_DEPLOY_HOOK  →  Render → Service → Settings → Deploy Hook → copy URL
#
# REQUIRED ENV VAR ON RENDER (Render → Service → Environment):
#   VITE_API_URL = https://tronmatix-beckend.onrender.com
#
# REQUIRED FILES IN YOUR REPO (ensures SPA routing works after deploy):
#   public/_redirects   →  contains exactly one line:  /* /index.html 200
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy Frontend to Render

on:
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout (needed for the _redirects check below) ──────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Verify _redirects exists so SPA routing works on Render ───────────
      - name: Check public/_redirects exists
        run: |
          if [ ! -f "public/_redirects" ]; then
            echo "❌ public/_redirects is missing!"
            echo "   Create the file with this single line:"
            echo "   /* /index.html 200"
            echo ""
            echo "   Without it, reloading /product/2 or /checkout will show 'Not Found'."
            exit 1
          fi

          CONTENT=$(cat public/_redirects)
          if [[ "$CONTENT" != "/* /index.html 200" ]]; then
            echo "⚠️  public/_redirects content looks wrong. Expected:"
            echo "   /* /index.html 200"
            echo "   Got:"
            echo "   $CONTENT"
            echo "   Continuing anyway — please double-check."
          else
            echo "✅ public/_redirects is correct"
          fi

      # ── 3. Trigger Render deploy (Render runs npm run build with its own env) ─
      # GitHub Secret: RENDER_DEPLOY_HOOK = https://api.render.com/deploy/srv-xxx?key=yyy
      - name: Trigger Render deployment
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "❌ RENDER_DEPLOY_HOOK secret is not set"
            echo "   Render → Service → Settings → Deploy Hook → copy URL"
            echo "   GitHub → Settings → Secrets → Actions → New secret → RENDER_DEPLOY_HOOK"
            exit 1
          fi

          echo "🚀 Triggering Render deployment..."

          HTTP_STATUS=$(curl -s -o /tmp/render_response.txt -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{}' \
            "$RENDER_DEPLOY_HOOK")

          echo "Response: $(cat /tmp/render_response.txt)"
          echo "HTTP status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "✅ Render build triggered successfully (HTTP $HTTP_STATUS)"
            echo ""
            echo "📋 Render will now:"
            echo "   1. Clone your repo"
            echo "   2. Run: npm ci && npm run build"
            echo "   3. Serve the dist/ folder with VITE_API_URL from Render env"
            echo ""
            echo "   Monitor progress: https://dashboard.render.com"
          else
            echo "❌ Deploy trigger failed (HTTP $HTTP_STATUS)"
            cat /tmp/render_response.txt
            exit 1
          fi