# render.yaml
# ── Place this in your project ROOT: tronmatix_frontend/render.yaml ───────────
#
# Render reads this file to configure your Static Site service.
# Docs: https://render.com/docs/infrastructure-as-code
# ─────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: tronmatix-frontend
    runtime: static

    # ── Build ──────────────────────────────────────────────────────────────────
    buildCommand: npm ci --legacy-peer-deps && npm run build
    staticPublishPath: ./dist

    # ── SPA routing fix ────────────────────────────────────────────────────────
    # Without this, reloading /product/2 or /checkout returns 404.
    # This tells Render to serve index.html for every route.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    # ── Environment variables (injected at build time by Render) ──────────────
    envVars:
      - key: VITE_API_URL
        value: https://tronmatix-beckend.onrender.com